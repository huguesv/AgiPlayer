name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      dotnetActionVersion: '10.0.x'
      solutionFile: AgiPlayer.slnx

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.dotnetActionVersion }}

    - name: Clean
      working-directory: src
      run: dotnet clean ${{env.solutionFile}} --configuration Release && dotnet nuget locals all --clear

    - name: Build
      working-directory: src
      run: dotnet build ${{env.solutionFile}} --configuration Release

    - name: Format
      working-directory: src
      run: dotnet format ${{env.solutionFile}} --verify-no-changes --verbosity diagnostic

    - name: Test
      working-directory: src
      run: dotnet test --solution ${{env.solutionFile}} --no-restore --verbosity normal --coverlet

    - name: Create Coverage Report
      if: matrix.os == 'ubuntu-latest'
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: '**/coverage.cobertura.*.xml'
        badge: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '8 10'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

    - name: Add Coverage to Job Summary
      if: matrix.os == 'ubuntu-latest'
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
